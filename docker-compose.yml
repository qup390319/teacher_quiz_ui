services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scilens}
      POSTGRES_USER: ${POSTGRES_USER:-scilens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scilens}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scilens} -d ${POSTGRES_DB:-scilens}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scilens}:${POSTGRES_PASSWORD:-scilens}@postgres:5432/${POSTGRES_DB:-scilens}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production-please-32chars}
      JWT_EXPIRES_HOURS: ${JWT_EXPIRES_HOURS:-24}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # P2 onwards — LLM provider 選擇（OpenAI 主、vLLM 備援）
      LLM_PRIMARY: ${LLM_PRIMARY:-openai}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-true}
      # vLLM（備援）
      VLLM_BASE_URL: ${VLLM_BASE_URL:-}
      VLLM_MODEL_NAME: ${VLLM_MODEL_NAME:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      # OpenAI（主）— token 不走 env，改用 docker secret 檔案掛載
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME:-gpt-5-mini}
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      OPENAI_PARAM_STYLE: ${OPENAI_PARAM_STYLE:-reasoning}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-minimal}
      OPENAI_MIN_COMPLETION_TOKENS: ${OPENAI_MIN_COMPLETION_TOKENS:-1024}
      RAGFLOW_MOCK: ${RAGFLOW_MOCK:-true}
      RAGFLOW_ENDPOINT: ${RAGFLOW_ENDPOINT:-}
      RAGFLOW_AGENT_ID: ${RAGFLOW_AGENT_ID:-}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:-}
    secrets:
      - openai_api_key
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:

# OpenAI API key 以檔案形式掛進 backend 的 /run/secrets/openai_api_key
# （不進 compose / env / image / repo）。請在專案根目錄手動建立此檔，內容只放 key。
# 建立後務必鎖權限：chmod 600 secrets/openai_api_key.txt
secrets:
  openai_api_key:
    file: ./secrets/openai_api_key.txt
